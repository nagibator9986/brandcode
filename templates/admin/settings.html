{% extends "admin/base_admin.html" %}
{% block admin_title %}Настройки{% endblock %}
{% block admin_content %}

<div class="max-w-3xl">
    <div class="mb-8">
        <h2 class="text-2xl font-bold">Настройки сайта</h2>
        <p class="text-gray-500 text-sm mt-1">Основные параметры вашего магазина</p>
    </div>

    <form action="/admin/settings" method="POST" class="space-y-6">
        <!-- General -->
        <div class="bg-[#1a1a1a] rounded-xl border border-white/5 p-6">
            <h3 class="text-lg font-bold mb-5">Общие</h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Название сайта</label>
                    <input type="text" name="site_name" value="{{ settings.site_name | default('BRANDCODE') }}"
                           class="w-full bg-[#111] border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Описание сайта</label>
                    <textarea name="site_description" rows="3"
                              class="w-full bg-[#111] border border-white/10 rounded-lg px-4 py-3 text-white text-sm resize-none">{{ settings.site_description | default('Магазин брендовой одежды') }}</textarea>
                </div>
            </div>
        </div>

        <!-- Contacts -->
        <div class="bg-[#1a1a1a] rounded-xl border border-white/5 p-6">
            <h3 class="text-lg font-bold mb-5">Контакты и соцсети</h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">WhatsApp номер</label>
                    <div class="flex items-center space-x-2">
                        <span class="text-gray-500 text-sm">+</span>
                        <input type="text" name="whatsapp_number" value="{{ settings.whatsapp_number | default('') }}" placeholder="77001234567"
                               class="flex-1 bg-[#111] border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-600 text-sm">
                    </div>
                    <p class="text-xs text-gray-600 mt-1">Без +, только цифры. Пример: 77001234567</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Instagram аккаунт</label>
                    <div class="flex items-center space-x-2">
                        <span class="text-gray-500 text-sm">@</span>
                        <input type="text" name="instagram_account" value="{{ settings.instagram_account | default('') }}" placeholder="brandcode.kz"
                               class="flex-1 bg-[#111] border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-600 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Telegram username</label>
                    <div class="flex items-center space-x-2">
                        <span class="text-gray-500 text-sm">@</span>
                        <input type="text" name="telegram_username" value="{{ settings.telegram_username | default('') }}" placeholder="brandcode_kz"
                               class="flex-1 bg-[#111] border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-600 text-sm">
                    </div>
                </div>
            </div>
        </div>

        <!-- Display Options -->
        <div class="bg-[#1a1a1a] rounded-xl border border-white/5 p-6">
            <h3 class="text-lg font-bold mb-5">Отображение</h3>
            <div class="space-y-4">
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" name="show_stock_to_users" value="1"
                           {% if settings.show_stock_to_users == '1' %}checked{% endif %}
                           class="w-5 h-5 rounded bg-[#111] border-white/10 text-[#d4a853] focus:ring-[#d4a853] focus:ring-offset-0">
                    <div>
                        <span class="text-sm font-medium text-white">Показывать остатки товара пользователям</span>
                        <p class="text-xs text-gray-500 mt-0.5">На странице товара будет отображаться количество в наличии для каждого размера</p>
                    </div>
                </label>
            </div>
        </div>

        <!-- Policies -->
        <div class="bg-[#1a1a1a] rounded-xl border border-white/5 p-6">
            <h3 class="text-lg font-bold mb-5">Информация</h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Информация о доставке</label>
                    <textarea name="delivery_info" rows="4"
                              class="w-full bg-[#111] border border-white/10 rounded-lg px-4 py-3 text-white text-sm resize-y">{{ settings.delivery_info | default('') }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Политика возврата</label>
                    <textarea name="return_policy" rows="4"
                              class="w-full bg-[#111] border border-white/10 rounded-lg px-4 py-3 text-white text-sm resize-y">{{ settings.return_policy | default('') }}</textarea>
                </div>
            </div>
        </div>

        <!-- Submit -->
        <div class="flex justify-end">
            <button type="submit" class="bg-[#d4a853] hover:bg-[#c8a04a] text-black font-semibold px-8 py-3 rounded-lg transition-all text-sm uppercase tracking-wider">
                Сохранить настройки
            </button>
        </div>
    </form>
</div>

{% endblock %}
